<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Ti 💖</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@400&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
margin:0;
background:#000;
font-family:'Poppins',sans-serif;
}

/* CONTENEDOR */
.swiper{
width:100%;
height:100vh;
}

/* SLIDE */
.slide{
position:relative;
display:flex;
justify-content:center;
align-items:center;
}

/* FONDO */
.bg{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
filter:brightness(0.4) blur(3px);
transform:scale(1.1);
}

/* OVERLAY */
.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

/* CONTENIDO CENTRADO PERFECTO */
.content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:500px;
text-align:center;
color:#ffffff; /* BLANCO */
}

/* TEXTO GRANDE Y LEGIBLE */
h1{
font-family:'Playfair Display',serif;
font-size:clamp(32px,8vw,48px);
margin-bottom:20px;
color:#fff;
text-shadow:0 2px 10px rgba(0,0,0,0.8);
}

p{
font-size:clamp(20px,6vw,26px);
line-height:1.7;
margin:12px 0;
color:#fff;
text-shadow:0 2px 10px rgba(0,0,0,0.8);
}

/* ANIMACIÓN */
.line{
opacity:0;
transform:translateY(25px);
animation:fadeUp 1.6s forwards;
}

.line:nth-child(1){animation-delay:1s}
.line:nth-child(2){animation-delay:3s}
.line:nth-child(3){animation-delay:5s}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

/* CORAZÓN */
.heart{
font-size:50px;
margin-top:25px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="swiper">
<div class="swiper-wrapper">

<!-- 1 -->
<div class="swiper-slide slide">
<div class="bg" style="background-image:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');"></div>
<div class="overlay"></div>
<div class="content">
<h1 class="line">Hola mi amor 💖</h1>
<p class="line">Sé que estás ocupada…</p>
<p class="line">Pero esto es importante…</p>
</div>
</div>

<!-- 2 -->
<div class="swiper-slide slide">
<div class="bg" style="background-image:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7');"></div>
<div class="overlay"></div>
<div class="content">
<p class="line">Entre tantas cosas…</p>
<p class="line">Quiero que escuches esto…</p>
<p class="line">Con calma…</p>
</div>
</div>

<!-- 3 -->
<div class="swiper-slide slide">
<div class="bg" style="background-image:url('https://images.unsplash.com/photo-1511988617509-a57c8a288659');"></div>
<div class="overlay"></div>
<div class="content">
<p class="line">Te conocí hace algunos años…</p>
<p class="line">Y algo en ti se quedó en mí…</p>
<p class="line">Para siempre…</p>
</div>
</div>

<!-- FINAL -->
<div class="swiper-slide slide">
<div class="bg" style="background-image:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb');"></div>
<div class="overlay"></div>
<div class="content">
<h1 class="line">Y hoy…</h1>
<p class="line">Sigo sintiendo lo mismo…</p>
<p class="line">Todo por ti 💖</p>
<div class="heart">❤️</div>
</div>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
new Swiper('.swiper',{
effect:'fade',
speed:2000,
autoplay:{
delay:9000,
disableOnInteraction:false
}
});
</script>

</body>
</html>
