<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para ti ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
    background: black;
    color: white;
}

/* SECCIONES */
.panel {
    height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* FONDO PARALLAX */
.bg {
    position: absolute;
    width: 100%;
    height: 120%;
    object-fit: cover;
    top: -10%;
    left: 0;
    z-index: -1;
    filter: brightness(0.5);
}

/* TEXTO */
.text {
    max-width: 600px;
    opacity: 0;
}

h1 {
    font-size: 2.5em;
}

p {
    margin-top: 20px;
    font-size: 1.2em;
    line-height: 1.6;
}

/* BOTÓN */
.start {
    background: #ff4d6d;
    border: none;
    padding: 12px 25px;
    border-radius: 30px;
    color: white;
    font-size: 16px;
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<!-- INTRO -->
<section class="panel" style="background:black;">
    <div>
        <h1>Hay algo que quiero decirte...</h1>
        <button class="start" onclick="start()">Toca aquí ❤️</button>
    </div>
</section>

<!-- SECCIÓN 1 -->
<section class="panel">
    <img class="bg" src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
    <div class="text">
        <h1>El tiempo pasó...</h1>
        <p>Y aún así… nunca dejé de pensar en ti.</p>
    </div>
</section>

<!-- SECCIÓN 2 -->
<section class="panel">
    <img class="bg" src="https://images.unsplash.com/photo-1519681393784-d120267933ba">
    <div class="text">
        <h1>Intentamos caminos distintos...</h1>
        <p>Pero la vida… tenía otros planes.</p>
    </div>
</section>

<!-- SECCIÓN 3 -->
<section class="panel">
    <img class="bg" src="https://images.unsplash.com/photo-1494783367193-149034c05e8f">
    <div class="text">
        <h1>Y hoy...</h1>
        <p>Nos vuelve a cruzar en el momento correcto ❤️</p>
    </div>
</section>

<!-- FINAL -->
<section class="panel">
    <img class="bg" src="https://images.unsplash.com/photo-1518199266791-5375a83190b7">
    <div class="text">
        <h1>¿Me das la oportunidad?</h1>
        <p>De comenzar algo contigo… esta vez de verdad.</p>
    </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

document.querySelectorAll(".panel").forEach((panel) => {

    let text = panel.querySelector(".text");
    let bg = panel.querySelector(".bg");

    if (text) {
        gsap.to(text, {
            opacity: 1,
            y: -20,
            duration: 1.5,
            scrollTrigger: {
                trigger: panel,
                start: "top center",
                toggleActions: "play none none reverse"
            }
        });
    }

    if (bg) {
        gsap.to(bg, {
            y: 100,
            ease: "none",
            scrollTrigger: {
                trigger: panel,
                scrub: true
            }
        });
    }
});

function start() {
    document.getElementById("music").play();
    window.scrollTo({ top: window.innerHeight, behavior: "smooth" });
}
</script>

</body>
</html>
