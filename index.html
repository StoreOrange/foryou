<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>
function start() {
    document.getElementById("music").play();
    window.scrollTo({
        top: window.innerHeight,
        behavior: "smooth"
    });
}

/* =========================
   ANIMACIÓN SCROLL PREMIUM
========================= */
const sections = document.querySelectorAll(".section");

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {

            let content = entry.target.querySelector(".content");

            gsap.fromTo(content,
                { opacity: 0, y: 60, filter: "blur(10px)" },
                { opacity: 1, y: 0, filter: "blur(0px)", duration: 1.5 }
            );

            /* EFECTO TEXTO TYPEWRITER */
            typeWriter(content.querySelector("p"));

        }
    });
}, { threshold: 0.4 });

sections.forEach(sec => observer.observe(sec));


/* =========================
   TYPEWRITER EFECTO
========================= */
function typeWriter(element) {
    if (!element || element.classList.contains("typed")) return;

    element.classList.add("typed");

    let text = element.innerHTML;
    element.innerHTML = "";
    let i = 0;

    let interval = setInterval(() => {
        element.innerHTML += text.charAt(i);
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 25);
}


/* =========================
   PARALLAX SUAVE
========================= */
window.addEventListener("scroll", () => {
    document.querySelectorAll(".section img").forEach(img => {
        let speed = 0.2;
        let offset = window.scrollY * speed;
        img.style.transform = `translateY(${offset}px) scale(1.1)`;
    });
});


/* =========================
   CORAZONES SUTILES
========================= */
for(let i=0;i<12;i++){
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.style.position = "fixed";
    heart.style.left = Math.random()*100+"%";
    heart.style.top = "100%";
    heart.style.fontSize = (12 + Math.random()*12)+"px";
    heart.style.opacity = 0.3;
    heart.style.animation = `floatHeart ${6 + Math.random()*5}s linear infinite`;
    document.body.appendChild(heart);
}

/* ANIMACIÓN CORAZONES */
let style = document.createElement("style");
style.innerHTML = `
@keyframes floatHeart {
    from { transform: translateY(0); }
    to { transform: translateY(-120vh); }
}
`;
document.head.appendChild(style);


/* =========================
   EFECTO GLOW EN TITULOS
========================= */
document.querySelectorAll("h1").forEach(h => {
    h.addEventListener("mouseenter", () => {
        h.style.textShadow = "0 0 15px rgba(255,77,109,0.8)";
    });

    h.addEventListener("mouseleave", () => {
        h.style.textShadow = "none";
    });
});
</script>
