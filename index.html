<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>
function start() {
    const music = document.getElementById("music");
    if (music) music.play().catch(()=>{});
    
    window.scrollTo({
        top: window.innerHeight,
        behavior: "smooth"
    });
}

/* =========================
   ANIMACIÓN SUAVE (SEGURA)
========================= */
const elements = document.querySelectorAll(".content");

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {

            gsap.fromTo(entry.target,
                { opacity: 0, y: 40 },
                { opacity: 1, y: 0, duration: 1.2, ease: "power2.out" }
            );

        }
    });
}, { threshold: 0.3 });

elements.forEach(el => observer.observe(el));

/* =========================
   PARALLAX SUAVE (CONTROLADO)
========================= */
window.addEventListener("scroll", () => {
    document.querySelectorAll(".section img").forEach(img => {
        let rect = img.getBoundingClientRect();

        if (rect.top < window.innerHeight && rect.bottom > 0) {
            let speed = 0.1;
            let offset = rect.top * speed;
            img.style.transform = `translateY(${offset}px) scale(1.1)`;
        }
    });
});

/* =========================
   CORAZONES SUTILES (LIGERO)
========================= */
for(let i=0;i<8;i++){
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.style.position = "fixed";
    heart.style.left = Math.random()*100+"%";
    heart.style.top = "100%";
    heart.style.fontSize = (12 + Math.random()*8)+"px";
    heart.style.opacity = 0.25;
    heart.style.pointerEvents = "none";
    heart.style.animation = `floatHeart ${8 + Math.random()*4}s linear infinite`;
    document.body.appendChild(heart);
}

/* ANIMACIÓN */
let style = document.createElement("style");
style.innerHTML = `
@keyframes floatHeart {
    from { transform: translateY(0); }
    to { transform: translateY(-120vh); }
}`;
document.head.appendChild(style);
</script>
