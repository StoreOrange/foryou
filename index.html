<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para ti ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<!-- Swiper -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    color: white;
}

/* SLIDER */
.swiper {
    width: 100%;
    height: 100vh;
}

.slide {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* FONDO */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.5);
}

/* TEXTO */
.content {
    z-index: 2;
    max-width: 600px;
    opacity: 0;
}

h1 {
    font-size: 2.3em;
}

p {
    margin-top: 20px;
}

/* ROSAS */
.rose {
    position: absolute;
    width: 40px;
    animation: float 6s infinite linear;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-100vh); }
}

/* BRILLO */
.sparkle {
    position: absolute;
    width: 5px;
    height: 5px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: sparkle 3s infinite;
}

@keyframes sparkle {
    0% { opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 0; }
}

/* BOTÓN */
button {
    padding: 12px 25px;
    border-radius: 30px;
    border: none;
    background: #ff4d6d;
    color: white;
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<div class="swiper">
<div class="swiper-wrapper">

<!-- INTRO -->
<div class="swiper-slide slide">
    <img class="bg" src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
    <div class="content">
        <h1>Hay algo que quiero decirte...</h1>
        <button onclick="start()">Toca aquí ❤️</button>
    </div>
</div>

<!-- SLIDE 1 -->
<div class="swiper-slide slide">
    <img class="bg" src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
    <div class="content">
        <h1>El tiempo pasó...</h1>
        <p>Pero nunca dejé de pensar en ti.</p>
    </div>
</div>

<!-- SLIDE 2 -->
<div class="swiper-slide slide">
    <img class="bg" src="https://images.unsplash.com/photo-1519681393784-d120267933ba">
    <div class="content">
        <h1>La vida nos separó...</h1>
        <p>Pero hoy… nos vuelve a unir ❤️</p>
    </div>
</div>

<!-- FINAL -->
<div class="swiper-slide slide">
    <img class="bg" src="https://images.unsplash.com/photo-1518199266791-5375a83190b7">
    <div class="content">
        <h1>¿Me das la oportunidad?</h1>
        <p>De escribir algo bonito contigo...</p>
    </div>
</div>

</div>
</div>

<script>
let swiper = new Swiper(".swiper", {
    direction: "horizontal",
    speed: 1000,
    parallax: true,
});

/* ANIMACIONES */
swiper.on('slideChange', () => {
    document.querySelectorAll(".content").forEach(el => {
        gsap.to(el, {opacity: 0});
    });

    let active = document.querySelector(".swiper-slide-active .content");
    gsap.to(active, {opacity: 1, y: -20, duration: 1});
});

/* INICIO */
function start() {
    document.getElementById("music").play();
    swiper.slideNext();
}

/* ROSAS */
for(let i=0;i<20;i++){
    let rose=document.createElement("img");
    rose.src="https://cdn-icons-png.flaticon.com/512/415/415733.png";
    rose.className="rose";
    rose.style.left=Math.random()*100+"%";
    rose.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(rose);
}

/* BRILLOS */
for(let i=0;i<30;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.style.top=Math.random()*100+"%";
    s.style.left=Math.random()*100+"%";
    document.body.appendChild(s);
}
</script>

</body>
</html>
