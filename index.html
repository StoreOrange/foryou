<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #000000, #2b1055);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
}

.container {
    text-align: center;
    animation: fadeIn 3s ease-in-out;
}

h1 {
    font-size: 2.5em;
    opacity: 0;
    animation: showText 4s forwards;
}

p {
    margin-top: 20px;
    font-size: 1.2em;
    opacity: 0;
    animation: showText 6s forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes showText {
    to { opacity: 1; }
}

button {
    margin-top: 30px;
    padding: 10px 20px;
    border: none;
    background: #ff4d6d;
    color: white;
    border-radius: 25px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h1>Siempre fuiste tú...</h1>
    <p>
        Aunque el tiempo pasó…  
        y la vida nos llevó por caminos distintos,  
        hoy estoy aquí…  
        porque nunca dejé de sentir lo mismo ❤️
    </p>

    <button onclick="mostrar()">Toca aquí 💌</button>
</div>

<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
</audio>

<script>
function mostrar() {
    document.getElementById("music").play();

    document.body.innerHTML = `
    <div class="container">
        <h1>Hoy tengo una oportunidad...</h1>
        <p>
        Y no pienso dejarla pasar.<br><br>
        Porque incluso cuando no estabas…<br>
        siempre estabas en mí.<br><br>
        ¿Me das la oportunidad de comenzar algo contigo? ❤️
        </p>
    </div>
    `;
}
</script>

</body>
</html>
